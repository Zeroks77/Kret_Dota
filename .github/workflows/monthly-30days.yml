name: Monthly pipeline wrapper

on:
  schedule:
    - cron: '5 3 1 * *' # 03:05 UTC on the 1st of each month, after daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run monthly step via unified pipeline
        shell: pwsh
        env:
          OPENDOTA_API_KEY: ${{ vars.OPENDOTA_API_KEY }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          ./pipeline.ps1 -Steps monthly,publish,legacy-clean -LastFullMonth
      - name: Commit and push
        if: ${{ success() }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -- docs data pipeline.ps1 scripts || true
          git commit -m "chore(ci): monthly unified pipeline wrapper" || echo "no changes"
          git push
