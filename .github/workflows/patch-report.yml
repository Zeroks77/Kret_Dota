name: Manual patch pipeline wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-patch:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch step via unified pipeline
        shell: pwsh
        env:
          OPENDOTA_API_KEY: ${{ vars.OPENDOTA_API_KEY }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          ./pipeline.ps1 -Steps patch,publish,legacy-clean
      - name: Commit and push
        if: ${{ success() }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -- docs data pipeline.ps1 scripts || true
          git commit -m "chore(ci): patch unified pipeline wrapper" || echo "no changes"
          git push
