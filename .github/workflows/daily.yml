name: Daily pipeline run

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unified pipeline
        shell: pwsh
        working-directory: ${{ github.workspace }}
        env:
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: |
          .\pipeline.ps1 -Steps fetch,discover,leagues,wards,publish,cleanup,legacy-clean -DiscoverViaSteam -RequestParse -MaxParseRequests 999999 -UserPersistDays 5
      - name: Commit and push
        if: ${{ success() }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add --update -- data docs scripts pipeline.ps1 || true
          git commit -m "chore(ci): daily unified pipeline run" || echo "no changes"
          git push
